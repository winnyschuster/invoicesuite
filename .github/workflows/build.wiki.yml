name: Update Wiki

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:

env:
  COMPOSER_NO_AUDIT: "1"
  COMPOSER_NO_INTERACTION: "1"
  COMPOSER_PROCESS_TIMEOUT: "0"
  XDEBUG_MODE: off
  SOURCE_REF: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
  GH_PAT: ${{ secrets.UPDATEWIKITOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  updatewiki:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ env.SOURCE_REF }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, bcmath, intl, gd, exif, iconv, imagick, json, xdebug
          coverage: none
          tools: composer:v2
          ini-values: memory_limit=-1
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: locked
          composer-options: --prefer-dist
          require-lock-file: false
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.GITHUB_TOKEN }}"}}'

      - name: Update wiki
        run: |
          php -f make/genmethoddocs.php
          git clone "https://$GH_PAT@github.com/horstoeko/invoicesuite.wiki.git" wiki

          if compgen -G 'make/classes/*.md' > /dev/null; then
            mv make/classes/*.md wiki/
          else
            echo 'No method documentation files were generated. Skipping copy step.'
          fi

          cd wiki
          git config user.name "HorstOeko"
          git config user.email "horstoeko@erling.com.de"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m 'Update wiki documentation'
            git push
          else
            echo 'No changes found. Skipping.'
          fi
