name: Release

on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    shell: bash

env:
  VALIDATORURL: https://github.com/itplr-kosit/validator/releases/download/v1.6.2/validator-1.6.2.zip
  VALIDATORURL2: https://github.com/itplr-kosit/validator/releases/download/v1.6.2/validator-1.6.2-standalone.jar
  VALIDATORSCENARIOURL: https://github.com/itplr-kosit/validator-configuration-xrechnung/releases/download/v2026-01-31/xrechnung-3.0.2-validator-configuration-2026-01-31.zip
  VALIDATORPATH: build/validator
  VALIDATORZIPFILENAME: validator.zip
  VALIDATORSCENARIOZIPFILENAME: validator-configuration.zip
  VALIDATORJARFILENAME: validator-1.6.2-standalone.jar
  VALIDATORSCENARIOFILENAME: scenarios.xml
  PHPDOCUMENTORURL: https://phpdoc.org/phpDocumentor.phar
  PHPDOCUMENTORFILENAME: phpDocumentor.phar
  VERAPDFURL: https://software.verapdf.org/rel/verapdf-installer.zip
  VERAPDFPATH: build/verapdf
  VERAPDFZIPFILENAME: verapdf.zip

jobs:
  build:
    permissions:
      contents: write
      checks: write
      pull-requests: write
      issues: read
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, bcmath, intl, gd, exif, iconv, imagick, json, xdebug
          coverage: xdebug

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: temurin

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-8.5-composer-${{ hashFiles('**/composer.json', '**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-8.5-composer-${{ hashFiles('**/composer.json') }}
            ${{ runner.os }}-8.5-composer-

      - name: Install Composer dependencies
        run: |
          composer config -g github-oauth.github.com ${{ secrets.GITHUB_TOKEN }}

          if [ -f composer.lock ]; then
            composer install --no-interaction --prefer-dist --no-progress
          else
            composer update --no-interaction --prefer-dist --no-progress
          fi

      - name: Prepare build directories
        run: |
          mkdir -p build/builddoc
          mkdir -p build/coverage
          mkdir -p build/coverage-html
          mkdir -p build/dist
          mkdir -p build/doc
          mkdir -p build/logs
          mkdir -p build/phpdoc
          mkdir -p build/phpstan

      - name: Run parallel lint
        run: vendor/bin/parallel-lint src tests

      - name: Calculate PHP-CS-Fixer cache key
        id: hash-php-cs-fixer
        run: echo "hash=$(sha256sum build/phpcsfixer.php | cut -c1-16)" >> "$GITHUB_OUTPUT"

      - name: Cache PHP-CS-Fixer
        uses: actions/cache@v5
        with:
          path: build/.php-cs-fixer.cache
          key: ${{ runner.os }}-8.5-php-cs-fixer-${{ steps.hash-php-cs-fixer.outputs.hash }}

      - name: Calculate PHPStan cache key
        id: hash-phpstan
        run: echo "hash=$(sha256sum build/phpstan.neon | cut -c1-16)" >> "$GITHUB_OUTPUT"

      - name: Cache PHPStan
        uses: actions/cache@v5
        with:
          path: build/phpstan
          key: ${{ runner.os }}-8.5-phpstan-${{ steps.hash-phpstan.outputs.hash }}

      - name: Run PHP-CS-Fixer
        env:
          XDEBUG_MODE: off
        run: vendor/bin/php-cs-fixer fix --config=build/phpcsfixer.php --dry-run --no-interaction

      - name: Run PHPStan
        run: php -d sys_temp_dir=$(pwd)/build/phpstan vendor/bin/phpstan analyze -c build/phpstan.neon --autoload-file=vendor/autoload.php --no-interaction --memory-limit 4G --error-format=github

      - name: Run PHPUnit tests
        env:
          XDEBUG_MODE: coverage
        run: vendor/bin/phpunit --stop-on-failure --configuration build/phpunit.xml

      - name: Calculate Schematron cache key
        id: hash-validator
        run: echo "hash=$(echo '${{ env.VALIDATORURL }} ${{ env.VALIDATORSCENARIOURL }}' | sha256sum | cut -c1-16)" >> "$GITHUB_OUTPUT"

      - name: Cache Schematron application
        id: cache-validator
        uses: actions/cache@v5
        with:
          path: ${{ env.VALIDATORPATH }}
          key: ${{ runner.os }}-8.5-validator-${{ steps.hash-validator.outputs.hash }}

      - name: Download Schematron application
        if: steps.cache-validator.outputs.cache-hit != 'true'
        run: |
          rm -rf "$VALIDATORPATH"
          mkdir -p "$VALIDATORPATH"
          wget "$VALIDATORURL" -O "$VALIDATORPATH/$VALIDATORZIPFILENAME"
          wget "$VALIDATORURL2" -O "$VALIDATORPATH/$VALIDATORJARFILENAME"
          wget "$VALIDATORSCENARIOURL" -O "$VALIDATORPATH/$VALIDATORSCENARIOZIPFILENAME"
          unzip "$VALIDATORPATH/$VALIDATORZIPFILENAME" -d "$VALIDATORPATH"
          unzip "$VALIDATORPATH/$VALIDATORSCENARIOZIPFILENAME" -d "$VALIDATORPATH"

      - name: Run Schematron tests
        run: |
          java -jar "$VALIDATORPATH/$VALIDATORJARFILENAME" -r "$VALIDATORPATH" -s "$VALIDATORPATH/$VALIDATORSCENARIOFILENAME" tests/assets/00_case_comfort_simple.xml
          java -jar "$VALIDATORPATH/$VALIDATORJARFILENAME" -r "$VALIDATORPATH" -s "$VALIDATORPATH/$VALIDATORSCENARIOFILENAME" tests/assets/00_case_comfort_simple_dto.xml
          java -jar "$VALIDATORPATH/$VALIDATORJARFILENAME" -r "$VALIDATORPATH" -s "$VALIDATORPATH/$VALIDATORSCENARIOFILENAME" tests/assets/00_case_xrechnung_cii_simple.xml
          java -jar "$VALIDATORPATH/$VALIDATORJARFILENAME" -r "$VALIDATORPATH" -s "$VALIDATORPATH/$VALIDATORSCENARIOFILENAME" tests/assets/00_case_xrechnung_cii_simple_dto.xml
          java -jar "$VALIDATORPATH/$VALIDATORJARFILENAME" -r "$VALIDATORPATH" -s "$VALIDATORPATH/$VALIDATORSCENARIOFILENAME" tests/assets/00_case_xrechnung_ublinvoice_simple.xml
          java -jar "$VALIDATORPATH/$VALIDATORJARFILENAME" -r "$VALIDATORPATH" -s "$VALIDATORPATH/$VALIDATORSCENARIOFILENAME" tests/assets/00_case_xrechnung_ublinvoice_simple_dto.xml
          java -jar "$VALIDATORPATH/$VALIDATORJARFILENAME" -r "$VALIDATORPATH" -s "$VALIDATORPATH/$VALIDATORSCENARIOFILENAME" tests/assets/00_case_xrechnung_ublcreditnote_simple.xml
          java -jar "$VALIDATORPATH/$VALIDATORJARFILENAME" -r "$VALIDATORPATH" -s "$VALIDATORPATH/$VALIDATORSCENARIOFILENAME" tests/assets/00_case_xrechnung_ublcreditnote_simple_dto.xml

      - name: Calculate veraPDF cache key
        id: hash-verapdf
        run: echo "hash=$(echo '${{ env.VERAPDFURL }}' | sha256sum | cut -c1-16)" >> "$GITHUB_OUTPUT"

      - name: Cache veraPDF application
        id: cache-verapdf
        uses: actions/cache@v5
        with:
          path: ${{ env.VERAPDFPATH }}
          key: ${{ runner.os }}-8.5-verapdf-${{ steps.hash-verapdf.outputs.hash }}

      - name: Download veraPDF application
        if: steps.cache-verapdf.outputs.cache-hit != 'true'
        run: |
          rm -rf "$VERAPDFPATH"
          mkdir -p "$VERAPDFPATH"
          wget "$VERAPDFURL" -O "$VERAPDFPATH/$VERAPDFZIPFILENAME"
          unzip -j "$VERAPDFPATH/$VERAPDFZIPFILENAME" -d "$VERAPDFPATH"

          cat > "$VERAPDFPATH/install.xml" <<EOF
          <?xml version="1.0" encoding="UTF-8" standalone="no"?>
          <AutomatedInstallation langpack="eng">
              <com.izforge.izpack.panels.htmlhello.HTMLHelloPanel id="welcome"/>
              <com.izforge.izpack.panels.target.TargetPanel id="install_dir">
                  <installpath>$(pwd)/$VERAPDFPATH</installpath>
              </com.izforge.izpack.panels.target.TargetPanel>
              <com.izforge.izpack.panels.packs.PacksPanel id="sdk_pack_select">
                  <pack index="0" name="veraPDF Mac and *nix Scripts" selected="true"/>
                  <pack index="1" name="veraPDF Validation model" selected="true"/>
                  <pack index="2" name="veraPDF Documentation" selected="true"/>
                  <pack index="3" name="veraPDF Sample Plugins" selected="true"/>
              </com.izforge.izpack.panels.packs.PacksPanel>
              <com.izforge.izpack.panels.install.InstallPanel id="install"/>
              <com.izforge.izpack.panels.finish.FinishPanel id="finish"/>
          </AutomatedInstallation>
          EOF

          VERAPDFINSTALLJAR=$(find "$VERAPDFPATH" -type f -name '*.jar' | head -n 1)
          if [ -z "$VERAPDFINSTALLJAR" ]; then
            echo 'No veraPDF installer found' >&2
            exit 1
          fi

          echo "veraPDF installer found at $VERAPDFINSTALLJAR"
          java -jar "$VERAPDFINSTALLJAR" "$VERAPDFPATH/install.xml"

      - name: Run veraPDF tests
        run: |
          echo 'Running PDF validation (1)'
          VERAPDFRESULT=$("$VERAPDFPATH/verapdf" --format text --flavour 3b --loglevel 0 tests/assets/00_case_comfort_simple.pdf)
          echo 'Result of validation (1)'
          echo "$VERAPDFRESULT"
          [[ "$VERAPDFRESULT" == PASS* ]] && echo 'PDF validation passed' || { echo 'Error: PDF validation not passed' >&2; exit 1; }

          echo 'Running PDF validation (2)'
          VERAPDFRESULT=$("$VERAPDFPATH/verapdf" --format text --flavour 3b --loglevel 0 tests/assets/00_case_extended_simple.pdf)
          echo 'Result of validation (2)'
          echo "$VERAPDFRESULT"
          [[ "$VERAPDFRESULT" == PASS* ]] && echo 'PDF validation passed' || { echo 'Error: PDF validation not passed' >&2; exit 1; }

      - name: Generate API documentation
        run: |
          wget "$PHPDOCUMENTORURL" -O "$PHPDOCUMENTORFILENAME"
          chmod +x "$PHPDOCUMENTORFILENAME"
          cd build
          php "../$PHPDOCUMENTORFILENAME"
          cd ..
          rm -f "$PHPDOCUMENTORFILENAME"

      - name: Package release artifacts
        run: |
          zip -r build/dist/doc.zip build/doc
          zip -r build/dist/builddoc.zip build/builddoc build/coverage build/coverage-html build/logs build/phpdoc

      - name: Publish unit test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: build/logs/junit.xml
          comment_mode: ${{ github.event_name == 'pull_request' && 'failures' || 'always' }}

      - name: Publish coverage summary
        if: always()
        run: php make/genbuildcoveragesummary.php --summary-file="$GITHUB_STEP_SUMMARY" --clover-file="build/logs/clover.xml" --crap4j-file="build/logs/crap4j.xml"

      - name: Publish build log artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Build log artifacts for ubuntu-24.04 PHP 8.5 (Release)
          path: build/logs
          if-no-files-found: error

      - name: Generate release notes
        run: |
          curr_tag="$GITHUB_REF_NAME"
          prev_tag=$(git tag -l --sort=-v:refname | grep -Fxv "$curr_tag" | sed -n '1p')

          if [ -z "$prev_tag" ]; then
            prev_tag=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Previous tag .... $prev_tag"
          echo "Current tag ..... $curr_tag"

          git log --no-merges --pretty=format:'- %s (%an)' "$prev_tag..$curr_tag"             | grep -Ev '^\- \[INFR\]|\- \[CS\] |\- \[DOC\] '             | sed -E 's/^- (#.*)/- [ENH] \1/' > build/releasenotes.txt || true

          touch build/releasenotes.txt
          ls -l build/
          ls -l build/releasenotes.txt
          cat build/releasenotes.txt

      - name: Generate SBOM
        run: |
          composer global config --no-plugins allow-plugins.cyclonedx/cyclonedx-php-composer true
          composer global require --no-interaction --no-progress cyclonedx/cyclonedx-php-composer
          composer CycloneDX:make-sbom --omit=dev --output-format=JSON --output-file=build/dist/sbom.json
          composer CycloneDX:make-sbom --omit=dev --output-format=XML --output-file=build/dist/sbom.xml

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifacts: build/dist/doc.zip,build/dist/builddoc.zip,build/dist/sbom.json,build/dist/sbom.xml
          bodyFile: build/releasenotes.txt
