name: Build Documentation

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  COMPOSER_NO_AUDIT: "1"
  COMPOSER_NO_INTERACTION: "1"
  COMPOSER_PROCESS_TIMEOUT: "0"
  XDEBUG_MODE: off
  PHPDOCUMENTORURL: https://phpdoc.org/phpDocumentor.phar
  PHPDOCUMENTORFILENAME: phpDocumentor.phar

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, bcmath, intl, gd, exif, iconv, imagick, json, xdebug
          coverage: none
          tools: composer:v2
          ini-values: memory_limit=-1
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: locked
          composer-options: --prefer-dist
          require-lock-file: false
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.GITHUB_TOKEN }}"}}'

      - name: Prepare build directories
        run: |
          mkdir -p build/builddoc
          mkdir -p build/dist
          mkdir -p build/doc
          mkdir -p build/coverage
          mkdir -p build/coverage-html
          mkdir -p build/logs
          mkdir -p build/phpdoc

      - name: Generate API documentation
        run: |
          wget "$PHPDOCUMENTORURL" -O "$PHPDOCUMENTORFILENAME"
          chmod +x "$PHPDOCUMENTORFILENAME"
          cd build
          php "../$PHPDOCUMENTORFILENAME"
          cd ..
          rm -f "$PHPDOCUMENTORFILENAME"

      - name: Package documentation artifacts
        run: zip -r build/dist/doc.zip build/doc

      - name: Publish documentation artifact
        uses: actions/upload-artifact@v7
        with:
          name: Documentation artifact
          path: build/dist/doc.zip
          if-no-files-found: error
