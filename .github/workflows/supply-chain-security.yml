name: Supply Chain Security

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  supply-chain:
    name: Composer audit, SBOM, and license report
    runs-on: ubuntu-24.04
    env:
      COMPOSER_PROCESS_TIMEOUT: 0
      COMPOSER_NO_INTERACTION: 1
      COMPOSER_NO_AUDIT: 1
      COMPOSER_AUDIT_ABANDONED: report

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, bcmath, intl, gd, exif, iconv, imagick, json
          tools: composer:v2
          coverage: none
          ini-values: memory_limit=-1
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build directories
        run: mkdir -p build/supply-chain

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: locked
          composer-options: --prefer-dist
          require-lock-file: false
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.GITHUB_TOKEN }}"}}'

      - name: Run Composer audit
        id: composer-audit
        run: |
          set +e
          composer audit --no-dev --abandoned=report --format=json > build/supply-chain/composer-audit.json
          audit_json_exit=$?
          composer audit --no-dev --abandoned=report --format=summary > build/supply-chain/composer-audit.txt
          audit_summary_exit=$?
          set -e

          audit_exit=$audit_json_exit
          if [ "$audit_summary_exit" -gt "$audit_exit" ]; then
            audit_exit=$audit_summary_exit
          fi

          echo "exit_code=$audit_exit" >> "$GITHUB_OUTPUT"

      - name: Generate Composer license report
        continue-on-error: true
        run: |
          composer licenses --no-dev --format=json > build/supply-chain/composer-licenses.json
          composer licenses --no-dev --format=summary > build/supply-chain/composer-licenses.txt

      - name: Allow CycloneDX Composer plugin
        continue-on-error: true
        run: composer global config --no-plugins allow-plugins.cyclonedx/cyclonedx-php-composer true

      - name: Install CycloneDX Composer plugin
        continue-on-error: true
        run: composer global require --no-interaction --no-progress cyclonedx/cyclonedx-php-composer

      - name: Generate CycloneDX SBOM
        continue-on-error: true
        run: |
          composer CycloneDX:make-sbom --output-format=JSON --output-file=build/supply-chain/composer-sbom.cdx.json --omit=dev
          composer CycloneDX:make-sbom --output-format=XML --output-file=build/supply-chain/composer-sbom.cdx.xml --omit=dev

      - name: Publish supply-chain reports
        continue-on-error: true
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Supply-chain reports
          path: build/supply-chain/
          if-no-files-found: error

      - name: Fail on Composer vulnerabilities
        if: steps.composer-audit.outputs.exit_code != '0'
        run: |
          echo 'Composer audit reported security advisories. Abandoned packages are reported separately and do not fail this workflow. See the uploaded supply-chain reports artifact for details.'
          exit 1
