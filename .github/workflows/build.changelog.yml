name: Update CHANGELOG

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:

env:
  COMPOSER_NO_AUDIT: "1"
  COMPOSER_NO_INTERACTION: "1"
  COMPOSER_PROCESS_TIMEOUT: "0"
  XDEBUG_MODE: off
  TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.ref_type == 'branch' && github.ref_name || github.event.repository.default_branch }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.ref_type == 'branch' && github.ref_name || github.event.repository.default_branch }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  updatechangelog:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: write
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.UPDATEWIKITOKEN }}
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ env.TARGET_BRANCH }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, bcmath, intl, gd, exif, iconv, imagick, json, xdebug
          coverage: none
          tools: composer:v2
          ini-values: memory_limit=-1
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: locked
          composer-options: --prefer-dist
          require-lock-file: false
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.GITHUB_TOKEN }}"}}'

      - name: Update CHANGELOG.md
        run: |
          php -f make/genchangelog.php all

          if [ ! -f make/CHANGELOG.md ]; then
            echo "No CHANGELOG.md was generated. Skipping update."
            exit 0
          fi

          rm -f CHANGELOG.md
          mv -f make/CHANGELOG.md .

          git config user.name "HorstOeko"
          git config user.email "horstoeko@erling.com.de"

          if [ -n "$(git status --porcelain)" ]; then
            git add CHANGELOG.md
            git commit -m "[DOC] Update CHANGELOG.md"
            git push origin HEAD:${{ env.TARGET_BRANCH }}
          else
            echo "No changes found. Skipping."
          fi
