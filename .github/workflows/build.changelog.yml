name: Update ChangeLog

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:

env:
  TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.ref_type == 'branch' && github.ref_name || github.event.repository.default_branch }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.ref_type == 'branch' && github.ref_name || github.event.repository.default_branch }}
  cancel-in-progress: true

jobs:
  updatechangelog:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: write
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.UPDATEWIKITOKEN }}
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ env.TARGET_BRANCH }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, bcmath, intl, gd, exif, iconv, imagick, json, xdebug
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-8.5-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-8.5-composer-${{ hashFiles('**/composer.json') }}
            ${{ runner.os }}-8.5-composer-

      - name: Install Composer dependencies
        run: |
          composer config -g github-oauth.github.com ${{ secrets.GITHUB_TOKEN }}
          composer update --no-interaction --prefer-dist --no-progress

      - name: Update CHANGELOG.md
        run: |
          php -f make/genchangelog.php all

          if [ ! -f make/CHANGELOG.md ]; then
            echo "No CHANGELOG.md was generated. Skipping update."
            exit 0
          fi

          rm -f CHANGELOG.md
          mv -f make/CHANGELOG.md .

          git config user.name "HorstOeko"
          git config user.email "horstoeko@erling.com.de"

          if [ -n "$(git status --porcelain)" ]; then
            git add CHANGELOG.md
            git commit -m "[DOC] Updated CHANGELOG.md"
            git push origin HEAD:${{ env.TARGET_BRANCH }}
          else
            echo "No changes found. Skipping."
          fi
